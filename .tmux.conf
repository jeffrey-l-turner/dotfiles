# Enable true 24-bit color support
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ',xterm-256color:RGB'

# Change prefix key (Ctrl+a instead of Ctrl+b)
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Mouse support for easy pane selection
set -g mouse on

# Increase history for Claude's verbose outputs
set -g history-limit 10000

# UTF-8 support for Claude's formatted responses
setw -q -g utf8 on

# Solarized Dark Theme
# base03=#002b36 base02=#073642 base01=#586e75 base00=#657b83
# base0=#839496  base1=#93a1a1  blue=#268bd2   cyan=#2aa198 green=#859900
set -g status-style "bg=#073642,fg=#839496"
set -g pane-border-style "fg=#586e75"
set -g pane-active-border-style "fg=#268bd2"
set -g message-style "bg=#073642,fg=#93a1a1"
set -g window-status-current-style "bg=#002b36,fg=#93a1a1,bold"
set -g window-status-style "bg=#073642,fg=#586e75"

# Status bar with left / centre / right using status-format
set -g status-format[0] "#[align=left]#[bg=#268bd2,fg=#002b36,bold] #S #[bg=#073642,fg=#268bd2]#[align=centre]#[bg=#2aa198,fg=#002b36,bold] #{s|/Users/jeff|~|:pane_current_path} #[align=right]#[bg=#859900,fg=#002b36,bold]#(whoami) | %Y-%m-%d %H:%M | #h"

# Intuitive pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

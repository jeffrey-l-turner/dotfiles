# Enable true 24-bit color support
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ',xterm-256color:RGB'

# Change prefix key (Ctrl+a instead of Ctrl+b)
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Mouse support for easy pane selection
set -g mouse on

# Increase history for Claude's verbose outputs
set -g history-limit 10000

# UTF-8 support for Claude's formatted responses
setw -q -g utf8 on

# Catppuccin Mocha Theme
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"

# Status bar with left / centre / right using status-format
set -g status-format[0] "#[align=left]#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]#[align=centre]#[bg=#DDA0DD,fg=#1e1e2e,bold] #{s|/Users/jeff|~|:pane_current_path} #[align=right]#[bg=#2e8b57,fg=#d3d3d3,bold]#(whoami) | %Y-%m-%d %H:%M | #h"

# Intuitive pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
